<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>봉지암의 여행 ✈️</title>
    <style>
        /* 웹사이트 전체 디자인 (CSS) */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* 아래는 깨끗한 하얀색 */
            color: #333;
        }

        /* 📸 상단 타이틀 영역 (히어로 섹션) */
        header {
            /* 배경 이미지 설정: 어두운 필터(0.5) + 단체사진 */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('./단체사진.jpg');
            background-size: cover; /* 이미지가 영역에 꽉 차게 */
            background-position: center; /* 이미지 중앙을 맞춤 */
            background-repeat: no-repeat;
            
            /* 높이 설정 및 중앙 정렬 */
            height: 400px; /* 타이틀 영역 높이 */
            display: flex;
            flex-direction: column;
            justify-content: center; /* 세로 중앙 */
            align-items: center; /* 가로 중앙 */
            text-align: center;
            
            /* 그림자 및 둥근 테두리 (선택 사항) */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: white; /* 타이틀 글씨색은 하얗게 */
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* 글씨 그림자로 가독성 확보 */
        }

        header p {
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.9;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* 컨텐츠 영역 (아래 하얀 부분) */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1rem;
        }

        /* 업로드 폼 스타일 */
        .upload-section {
            background: #f9f9f9;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid #eee;
        }

        .upload-section h2 {
            margin-top: 0;
            font-size: 1.4rem;
            color: #2c3e50;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 0.5rem;
        }

        input[type="file"], input[type="text"], textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* 갤러리 그리드 스타일 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding-bottom: 4rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-author {
            font-size: 0.95rem;
            color: #3498db;
            margin: 0 0 0.5rem 0;
            font-weight: 700;
        }

        .card-desc {
            font-size: 0.95rem;
            color: #555;
            margin: 0;
            line-height: 1.5;
        }
        
        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            color: #999;
            padding: 4rem;
            background: #f9f9f9;
            border-radius: 12px;
            border: 2px dashed #ddd;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎒 봉지암의 여행</h1>
        <p>우리들의 즐거웠던 추억, 여기에 다 모아보자!</p>
    </header>

    <div class="container">
        <div class="upload-section">
            <h2>새로운 추억 올리기</h2>
            <input type="file" id="photoInput" accept="image/*">
            <input type="text" id="authorInput" placeholder="누가 올리는 건가요? (예: 봉지암 총무)">
            <textarea id="descInput" placeholder="이 사진에 얽힌 비하인드 스토리를 적어주세요!"></textarea>
            <button onclick="uploadPhoto()">사진 등록하기</button>
        </div>

        <div class="gallery" id="galleryContainer">
            <div class="empty-message" id="emptyMessage">
                아직 올라온 사진이 없습니다.<br>첫 번째 추억을 장식해 보세요!
            </div>
        </div>
    </div>

    <script>
        // 사진 업로드 기능 (JavaScript) - 이전과 동일
        function uploadPhoto() {
            const photoInput = document.getElementById('photoInput');
            const authorInput = document.getElementById('authorInput');
            const descInput = document.getElementById('descInput');
            const galleryContainer = document.getElementById('galleryContainer');
            const emptyMessage = document.getElementById('emptyMessage');

            if (photoInput.files.length === 0) {
                alert('사진을 선택해주세요!');
                return;
            }

            const file = photoInput.files[0];
            const author = authorInput.value.trim() || '익명의 친구';
            const description = descInput.value.trim() || '추억의 한 장';

            const reader = new FileReader();
            
            reader.onload = function(e) {
                const imageUrl = e.target.result;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${imageUrl}" alt="여행 사진">
                    <div class="card-content">
                        <p class="card-author">📸 ${author}</p>
                        <p class="card-desc">${description}</p>
                    </div>
                `;

                if (emptyMessage) {
                    emptyMessage.style.display = 'none';
                }

                galleryContainer.insertBefore(card, galleryContainer.firstChild);

                photoInput.value = '';
                authorInput.value = '';
                descInput.value = '';
            };

            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
